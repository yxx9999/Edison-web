<!DOCTYPE html>

  <body class="page-contact">
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="./index.html">Edison</a>
        <nav class="nav">
          <a href="./index.html">Start</a>
          <a href="./about.html">About</a>

      <main class="content-main">
        <section class="page-hero">
          <div class="contact-hero-image" aria-label="Contact banner image"></div>
        </section>

        <section class="contact-grid">
          <article class="contact-card share-card">
            <p class="card-label">Share</p>
            <div class="share-card-body">
              <button class="share-button" type="button" id="share-contact-button">分享</button>
            </div>
          </article>

          <article class="contact-card preferred-card">
            <p class="card-label">Preferred Channel</p>
            <h2>优先联系</h2>
            <p>如果是合作、产品讨论或内容交流，优先发邮件给我。</p>
            <div class="preferred-actions">
              <button
                class="button button-primary email-copy-button"
                type="button"
                id="copy-email-button"
                data-email="edisonxu0909@gmail.com"
              >
                edisonxu0909@gmail.com
              </button>
              <p class="copy-status" id="copy-email-status" aria-live="polite"></p>
            </div>
          </article>

            <p class="card-label">Platforms</p>
            <h2>平台账号</h2>

        <section class="friends-section" id="friends">
          <div class="section-heading">
            <p class="eyebrow">Friends</p>
            <h2>Another builder</h2>
          </div>
          <div class="friend-grid">
            <article class="friend-card">
              <h3>Builder Friend A</h3>
              <p>长期关注产品、内容与创业叙事，值得持续追踪。</p>
            </article>
            <article class="friend-card">
              <h3>Operator Friend B</h3>
              <p>擅长把复杂运营事情做成清晰的系统，适合一起合作和交流。</p>
            </article>
            <article class="friend-card">
              <h3>Creator Friend C</h3>
              <p>擅长内容和视觉表达，能把抽象东西变成有温度的输出。</p>
            </article>
