<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edison | Blog</title>
    <meta
      name="description"
      content="Edison 的博客页，支持文章列表、详情和基础 Markdown 渲染。"
    />
    <link rel="stylesheet" href="/styles/site.css" />
  </head>
  <body class="page-blog">
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="/index.html">Edison</a>
        <nav class="nav">
          <a href="/index.html">Start</a>
          <a href="/about.html">About</a>
          <a href="/blog.html" aria-current="page">Blog</a>
          <a href="/contact.html">Contact</a>
          <a href="/mail.html">Mail</a>
        </nav>
      </header>

      <main class="content-main">
        <section class="page-hero">
          <div class="blog-hero-image" aria-label="Blog banner image"></div>
        </section>

        <section class="blog-layout" id="blog-app">
          <aside class="blog-sidebar">
            <div class="sidebar-block">
              <p class="card-label">Categories</p>
              <ul class="chip-list">
                <li aria-current="true">Edisons Journey</li>
                <li>Building Startups!</li>
                <li>AI &amp; Agent</li>
                <li>Product &amp; Growth</li>
                <li>Design &amp; Brand</li>
                <li>Content &amp; Distribution</li>
                <li>System</li>
                <li>Others</li>
              </ul>
            </div>
            <div class="sidebar-block">
              <p class="card-label">精选 5 篇</p>
              <ol class="featured-list" id="featured-posts"></ol>
            </div>
          </aside>

          <div class="blog-panel">
            <div class="blog-toolbar">
              <h2 id="blog-view-title">Blogs</h2>
            </div>
            <div id="blog-content"></div>
          </div>
        </section>
      </main>
    </div>
    <script src="/scripts/posts.js"></script>
    <script src="/scripts/site.js"></script>
  </body>
</html>
